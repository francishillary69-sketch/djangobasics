<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0056b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d82;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Engine Block -->
  <rect x="40" y="60" width="120" height="80" fill="url(#engineGrad)" stroke="#20c997" stroke-width="2" rx="8"/>
  
  <!-- Cylinders -->
  <rect x="55" y="75" width="20" height="50" fill="#16273a" stroke="#4db8ff" stroke-width="2" rx="4"/>
  <rect x="80" y="75" width="20" height="50" fill="#16273a" stroke="#4db8ff" stroke-width="2" rx="4"/>
  <rect x="105" y="75" width="20" height="50" fill="#16273a" stroke="#4db8ff" stroke-width="2" rx="4"/>
  <rect x="130" y="75" width="20" height="50" fill="#16273a" stroke="#4db8ff" stroke-width="2" rx="4"/>
  
  <!-- Pistons -->
  <circle cx="65" cy="110" r="6" fill="#20c997"/>
  <circle cx="90" cy="110" r="6" fill="#20c997"/>
  <circle cx="115" cy="110" r="6" fill="#20c997"/>
  <circle cx="140" cy="110" r="6" fill="#20c997"/>
  
  <!-- Crankshaft -->
  <circle cx="100" cy="150" r="12" fill="#4db8ff" stroke="#20c997" stroke-width="2"/>
  
  <!-- Connecting lines -->
  <line x1="65" y1="116" x2="95" y2="150" stroke="#4db8ff" stroke-width="2"/>
  <line x1="90" y1="116" x2="100" y2="150" stroke="#4db8ff" stroke-width="2"/>
  <line x1="115" y1="116" x2="105" y2="150" stroke="#4db8ff" stroke-width="2"/>
  <line x1="140" y1="116" x2="110" y2="150" stroke="#4db8ff" stroke-width="2"/>
  
  <!-- Title -->
  <text x="100" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#4db8ff">Engine</text>
</svg>
